[tool.commitizen]
name = "cz_conventional_commits"
tag_format = "v$version"
# Derive the current version from the latest git tag (no version field to keep
# in sync) so CI can auto-compute the next version. major_version_zero keeps
# pre-1.0 feat/breaking changes as MINOR bumps (never an accidental 1.0.0).
version_provider = "scm"
major_version_zero = true
