apiVersion: vault.platform.io/v1alpha1
kind: VaultKVSecret
metadata:
  labels:
    app.kubernetes.io/name: vault-access-operator
    app.kubernetes.io/managed-by: kustomize
  name: app-config
  namespace: default
spec:
  # Reference to the VaultConnection to use
  connectionRef: vault-primary

  # Full KV v2 data path to seed. Must contain a "/data/" segment and is
  # immutable after creation.
  path: "secret/data/apps/default/app-config"

  # Initial placeholder content, written ONLY if the path is absent — never
  # overwrites an existing secret. Use empty-string placeholder keys so that
  # External Secrets Operator references targeting a specific property resolve.
  # Omit `data` entirely for a truly empty {} (sufficient for whole-secret
  # dataFrom reads).
  data:
    username: ""
    password: ""

  # What happens to the seeded secret when this resource is deleted:
  # - Delete (default): delete-if-untouched — only removes the secret if it is
  #   still operator-owned and unmodified since seeding; a secret written to
  #   since seeding is always retained.
  # - Retain: never delete the seeded secret.
  deletionPolicy: Delete
