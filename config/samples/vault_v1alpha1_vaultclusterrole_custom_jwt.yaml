# Example VaultClusterRole managed on a JWT/OIDC auth method mounted at a CUSTOM
# path whose name does NOT start with "jwt". The mount is declared ONCE on the
# VaultConnection (platform team); roles carry no mount fields and follow their
# connection — see docs/auth-methods/jwt.md.
#
# Assumes the operator admin has already enabled + configured the mount, e.g.:
#   vault auth enable -path=custom-oidc jwt
#   vault write auth/custom-oidc/config \
#       oidc_discovery_url=https://idp.example.com \
#       bound_issuer=https://idp.example.com
apiVersion: vault.platform.io/v1alpha1
kind: VaultConnection
metadata:
  labels:
    app.kubernetes.io/name: vault-access-operator
    app.kubernetes.io/managed-by: kustomize
  name: vault-custom-oidc
spec:
  address: https://vault.example.com:8200
  auth:
    kubernetes:
      role: vault-access-operator
  # Roles referencing this connection land on auth/custom-oidc. The name
  # doesn't start with kubernetes/jwt, so the family is declared explicitly.
  defaults:
    authPath: custom-oidc
    authType: jwt
---
apiVersion: vault.platform.io/v1alpha1
kind: VaultClusterRole
metadata:
  labels:
    app.kubernetes.io/name: vault-access-operator
    app.kubernetes.io/managed-by: kustomize
  name: custom-oidc-role
spec:
  connectionRef: vault-custom-oidc
  conflictPolicy: Fail
  deletionPolicy: Delete

  # Placeholder — bypassed for JWT roles bound via spec.jwt.boundClaims*.
  serviceAccounts:
    - name: platform-controller
      namespace: platform-system

  policies:
    - kind: VaultClusterPolicy
      name: shared-secrets-reader

  tokenTTL: 10m
  tokenMaxTTL: 15m

  jwt:
    userClaim: sub
    boundAudiences:
      - https://vault.example.com
    boundClaims:
      project: custom-oidc
