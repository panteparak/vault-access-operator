name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., 0.3.0). Leave empty to auto-compute from conventional commits.'
        required: false
        default: ''
        type: string

permissions: {}

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ============================================================================
  # Guard: Verify CI passed and extract release metadata
  # ============================================================================

  guard:
    name: Guard
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    outputs:
      should-release: ${{ steps.final-version.outputs.should-release }}
      version: ${{ steps.final-version.outputs.version }}
      tag: ${{ steps.final-version.outputs.tag }}
      checkout-ref: ${{ steps.final-version.outputs.checkout-ref }}
      image-tag: ${{ steps.ci-lookup.outputs.image-tag }}
      ci-run-id: ${{ steps.ci-lookup.outputs.run-id }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
          fetch-tags: true
          persist-credentials: false

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.x'

      - name: Install commitizen
        run: pip install commitizen

      - name: Auto-compute version with commitizen
        id: dispatch
        run: |
          # Try commitizen bump --dry-run to get next version
          CZ_VERSION=$(cz bump --dry-run 2>/dev/null | grep -oP 'bump version .+ → \K.+' || echo "")
          echo "cz-version=$CZ_VERSION" >> $GITHUB_OUTPUT

      - name: Set dispatch version
        id: dispatch-version
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          if [[ -n "$INPUT_VERSION" ]]; then
            VERSION="$INPUT_VERSION"
          elif [[ -n "${{ steps.dispatch.outputs.cz-version }}" ]]; then
            VERSION="${{ steps.dispatch.outputs.cz-version }}"
          else
            echo "::error::Could not determine version. Provide a version or ensure conventional commits exist."
            exit 1
          fi
          echo "tag=v${VERSION}" >> $GITHUB_OUTPUT
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "should-release=true" >> $GITHUB_OUTPUT
          echo "Release (dispatch): v${VERSION}"

      - name: Set final version
        id: final-version
        run: |
          TAG="${{ steps.dispatch-version.outputs.tag }}"
          VERSION="${{ steps.dispatch-version.outputs.version }}"
          SHOULD="${{ steps.dispatch-version.outputs.should-release || 'false' }}"
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "should-release=${SHOULD}" >> $GITHUB_OUTPUT
          echo "checkout-ref=" >> $GITHUB_OUTPUT

      - name: Find CI run for HEAD
        if: steps.final-version.outputs.should-release == 'true'
        id: ci-lookup
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          SHA=$(git rev-parse HEAD)
          SHORT_SHA="${SHA:0:7}"
          echo "image-tag=sha-${SHORT_SHA}" >> $GITHUB_OUTPUT

          # Find successful CI run for this commit
          RUN_ID=$(gh api "repos/${{ github.repository }}/actions/workflows/ci.yaml/runs?head_sha=${SHA}&status=success&per_page=1" \
            --jq '.workflow_runs[0].id // empty' 2>/dev/null || echo "")

          if [[ -n "$RUN_ID" ]]; then
            echo "Found CI run: $RUN_ID"
            echo "run-id=$RUN_ID" >> $GITHUB_OUTPUT
          else
            echo "No CI run found for $SHA — will build from source"
            echo "run-id=" >> $GITHUB_OUTPUT
          fi

  # ============================================================================
  # Setup: Platform Matrix
  # ============================================================================

  setup:
    name: Setup
    runs-on: ubuntu-latest
    outputs:
      platforms: ${{ steps.platforms.outputs.matrix }}
    steps:
      - name: Set platform matrix
        id: platforms
        run: |
          echo 'matrix=["linux/amd64", "linux/arm64"]' >> $GITHUB_OUTPUT

  # ============================================================================
  # Docker Release Build: Parallel per-platform builds (fallback)
  # ============================================================================
  # Only runs when there's no CI run to retag from.
  # Mirrors CI's matrix build pattern for parallel per-platform builds.

  docker-release-build:
    name: Docker Build (${{ matrix.platform }})
    runs-on: ubuntu-latest
    needs: [guard, setup]
    if: needs.guard.outputs.should-release == 'true' && needs.guard.outputs.ci-run-id == ''
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        platform: ${{ fromJson(needs.setup.outputs.platforms) }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ needs.guard.outputs.checkout-ref }}
          persist-credentials: false

      - name: Prepare platform vars
        id: platform
        run: |
          platform="${{ matrix.platform }}"
          echo "pair=${platform//\//-}" >> $GITHUB_OUTPUT  # linux/amd64 -> linux-amd64

      - name: Check if QEMU is needed
        id: qemu-check
        run: |
          RUNNER_ARCH="${{ runner.arch }}"
          TARGET="${{ matrix.platform }}"
          NEED_QEMU="true"
          if [[ "$RUNNER_ARCH" == "X64" && "$TARGET" == "linux/amd64" ]] || \
             [[ "$RUNNER_ARCH" == "ARM64" && "$TARGET" == "linux/arm64" ]]; then
            NEED_QEMU="false"
          fi
          echo "needed=$NEED_QEMU" >> $GITHUB_OUTPUT
          echo "Runner: $RUNNER_ARCH, Target: $TARGET, QEMU needed: $NEED_QEMU"

      - uses: docker/setup-qemu-action@29109295f81e9208d7d86ff1c6c12d2833863392 # v3.6.0
        if: steps.qemu-check.outputs.needed == 'true'

      - uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2 # v3.10.0

      - uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3.4.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@471d1dc4e07e5cdedd4c2171150001c434f0b7a4 # v6.15.0
        with:
          context: .
          platforms: ${{ matrix.platform }}
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.guard.outputs.version }}-${{ steps.platform.outputs.pair }}
          cache-from: type=gha,scope=release-${{ steps.platform.outputs.pair }}
          cache-to: type=gha,scope=release-${{ steps.platform.outputs.pair }},mode=max

  # ============================================================================
  # Docker Release Manifest: Retag CI images or merge platform-specific builds
  # ============================================================================
  # If a CI run exists: retags CI-built SHA images to version tags using
  # `docker buildx imagetools create`. This is a manifest-only operation —
  # no rebuild, bit-for-bit identical to what CI tested.
  # If no CI run: merges per-platform builds into a multi-arch manifest.

  docker-release-manifest:
    name: Docker Manifest
    runs-on: ubuntu-latest
    needs: [guard, setup, docker-release-build]
    if: always() && needs.guard.outputs.should-release == 'true' && !contains(needs.*.result, 'failure')
    permissions:
      contents: read
      packages: write
    steps:
      - uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2 # v3.10.0

      - uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3.4.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Retag existing CI-tested images (when CI run found)
      - name: Retag CI images to release version
        if: needs.guard.outputs.ci-run-id != ''
        env:
          IMAGE_TAG: ${{ needs.guard.outputs.image-tag }}
          VERSION: ${{ needs.guard.outputs.version }}
        run: |
          echo "Retagging ${IMAGE_TAG} -> ${VERSION} and latest"
          docker buildx imagetools create \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${VERSION} \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${IMAGE_TAG}

      # Fallback: merge platform-specific builds into multi-arch manifest
      - name: Create multi-platform manifest
        if: needs.guard.outputs.ci-run-id == ''
        env:
          VERSION: ${{ needs.guard.outputs.version }}
        run: |
          IMAGES=""
          for platform in $(echo '${{ needs.setup.outputs.platforms }}' | jq -r '.[]'); do
            pair="${platform//\//-}"
            IMAGES="$IMAGES ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${VERSION}-${pair}"
          done
          echo "Merging platform images into ${VERSION} and latest: $IMAGES"
          docker buildx imagetools create \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${VERSION} \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest \
            $IMAGES

  # ============================================================================
  # Create GitHub Release
  # ============================================================================

  github-release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [guard, docker-release-manifest]
    if: needs.guard.outputs.should-release == 'true'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ needs.guard.outputs.checkout-ref }}
          fetch-depth: 0
          persist-credentials: false

      # Download SBOMs from CI run (when available)
      - name: Download SBOM (linux-amd64)
        if: needs.guard.outputs.ci-run-id != ''
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          run-id: ${{ needs.guard.outputs.ci-run-id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          name: sbom-linux-amd64
          path: /tmp/sbom-amd64/
        continue-on-error: true

      - name: Download SBOM (linux-arm64)
        if: needs.guard.outputs.ci-run-id != ''
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          run-id: ${{ needs.guard.outputs.ci-run-id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          name: sbom-linux-arm64
          path: /tmp/sbom-arm64/
        continue-on-error: true

      # Generate install manifest with correct version
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version-file: go.mod

      - uses: azure/setup-helm@b9e51907a09c216f16ebe8536097933489208112 # v4.3.0
        with:
          version: 'v3.14.0'

      - name: Stamp version in chart
        env:
          VERSION: ${{ needs.guard.outputs.version }}
        run: |
          sed -i "s/^version:.*/version: ${VERSION}/" charts/vault-access-operator/Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: \"${VERSION}\"/" charts/vault-access-operator/Chart.yaml
          sed -i "s/tag:.*/tag: \"${VERSION}\"/" charts/vault-access-operator/values.yaml

      - name: Build install manifest
        env:
          VERSION: ${{ needs.guard.outputs.version }}
        run: make build-installer IMG=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${VERSION}

      # Build additional release assets
      - name: Package CRDs tarball
        env:
          VERSION: ${{ needs.guard.outputs.version }}
        run: |
          tar -czvf crds-${VERSION}.tar.gz -C config/crd/bases/ .

      - name: Package Helm chart
        env:
          VERSION: ${{ needs.guard.outputs.version }}
        run: |
          helm package charts/vault-access-operator -d dist/

      - name: Generate checksums
        env:
          VERSION: ${{ needs.guard.outputs.version }}
        run: |
          cd dist
          cp ../crds-${VERSION}.tar.gz .
          sha256sum install.yaml crds-${VERSION}.tar.gz vault-access-operator-${VERSION}.tgz > checksums.txt
          cat checksums.txt

      # Prepare all release assets
      - name: Prepare release assets
        env:
          VERSION: ${{ needs.guard.outputs.version }}
        run: |
          mkdir -p release-assets
          cp dist/install.yaml release-assets/
          cp dist/crds-${VERSION}.tar.gz release-assets/
          cp dist/vault-access-operator-${VERSION}.tgz release-assets/
          cp dist/checksums.txt release-assets/
          [ -f /tmp/sbom-amd64/sbom.json ] && cp /tmp/sbom-amd64/sbom.json release-assets/sbom-linux-amd64.json || true
          [ -f /tmp/sbom-arm64/sbom.json ] && cp /tmp/sbom-arm64/sbom.json release-assets/sbom-linux-arm64.json || true
          echo "Release assets:"
          ls -la release-assets/

      - name: Generate changelog
        env:
          TAG: ${{ needs.guard.outputs.tag }}
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            echo "Generating changelog from $PREV_TAG to $TAG"
            CHANGELOG=$(git log --pretty=format:"- %s" "$PREV_TAG".."$TAG" | head -50)
          else
            echo "No previous tag found, using all commits"
            CHANGELOG=$(git log --pretty=format:"- %s" | head -50)
          fi
          echo "$CHANGELOG" > /tmp/changelog.txt

      - name: Create Release
        uses: softprops/action-gh-release@da05d552573ad5aba039eaac05058a918a7bf631 # v2.2.2
        with:
          tag_name: ${{ needs.guard.outputs.tag }}
          name: ${{ needs.guard.outputs.tag }}
          body_path: /tmp/changelog.txt
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(needs.guard.outputs.tag, '-') }}
          files: release-assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ============================================================================
  # Publish Helm Chart
  # ============================================================================

  helm-release:
    name: Helm Chart Release (OCI)
    runs-on: ubuntu-latest
    needs: [guard, github-release]
    if: needs.guard.outputs.should-release == 'true'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ needs.guard.outputs.checkout-ref }}
          persist-credentials: false

      - uses: azure/setup-helm@b9e51907a09c216f16ebe8536097933489208112 # v4.3.0
        with:
          version: 'v3.14.0'

      - name: Stamp version in chart
        env:
          VERSION: ${{ needs.guard.outputs.version }}
        run: |
          sed -i "s/^version:.*/version: ${VERSION}/" charts/vault-access-operator/Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: \"${VERSION}\"/" charts/vault-access-operator/Chart.yaml
          sed -i "s/tag:.*/tag: \"${VERSION}\"/" charts/vault-access-operator/values.yaml

      - name: Login to GHCR
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_ACTOR: ${{ github.actor }}
        run: echo "${GITHUB_TOKEN}" | helm registry login ghcr.io --username "${GH_ACTOR}" --password-stdin

      - name: Package and push Helm chart
        env:
          VERSION: ${{ needs.guard.outputs.version }}
          REPO: ${{ github.repository }}
        run: |
          helm package charts/vault-access-operator
          helm push "vault-access-operator-${VERSION}.tgz" "oci://ghcr.io/${REPO}/charts"

  # ============================================================================
  # Deploy Documentation
  # ============================================================================

  docs-release:
    name: Deploy Documentation
    runs-on: ubuntu-latest
    needs: [guard, github-release]
    if: needs.guard.outputs.should-release == 'true'
    permissions:
      contents: write
      pages: write
      id-token: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ needs.guard.outputs.checkout-ref }}
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.x'
      - run: pip install mkdocs-material
      - run: mkdocs build

      - name: Deploy to gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.guard.outputs.tag }}
        run: |
          git clone --branch gh-pages --single-branch \
            "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git" gh-pages 2>/dev/null || {
            mkdir gh-pages && cd gh-pages && git init -b gh-pages
            git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git"
          }
          rsync -av --delete --exclude='.git' site/ gh-pages/
          touch gh-pages/.nojekyll
          cd gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A && git commit -m "Deploy docs for $TAG" || true
          git push origin gh-pages --force

  # ============================================================================
  # Summary
  # ============================================================================

  release-summary:
    name: Release Summary
    runs-on: ubuntu-latest
    needs: [guard, docker-release-manifest, github-release, helm-release, docs-release]
    if: always() && needs.guard.outputs.should-release == 'true'
    env:
      VERSION: ${{ needs.guard.outputs.version }}
      TAG: ${{ needs.guard.outputs.tag }}
    steps:
      - name: Summary
        run: |
          echo "## Release $TAG Complete!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Artifacts" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Artifact | Location |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|----------|" >> $GITHUB_STEP_SUMMARY
          echo "| Docker Image | ghcr.io/${{ github.repository }}:$VERSION |" >> $GITHUB_STEP_SUMMARY
          echo "| Helm Chart | \`helm install vault-access-operator oci://ghcr.io/${{ github.repository }}/charts/vault-access-operator --version $VERSION\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Documentation | https://panteparak.github.io/vault-access-operator/ |" >> $GITHUB_STEP_SUMMARY
          echo "| GitHub Release | https://github.com/${{ github.repository }}/releases/tag/$TAG |" >> $GITHUB_STEP_SUMMARY
