name: Release

on:
  # Continuous delivery: fires after CI completes. The guard job only proceeds
  # on a SUCCESSFUL CI run for `main`, and only releases when commitizen finds a
  # bumpable commit (feat/fix/breaking) since the last tag.
  workflow_run:
    workflows: ["CI"]
    types: [completed]
  # Manual fallback — optionally force an explicit version.
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., 0.7.0). Leave empty to auto-compute from conventional commits.'
        required: false
        default: ''
        type: string

permissions: {}

# Serialize releases so two CI completions can't both bump+push concurrently.
concurrency:
  group: release
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ============================================================================
  # Guard + Bump: gate on CI success, auto-compute version, commit + tag
  # ============================================================================

  guard:
    name: Bump & Guard
    runs-on: ubuntu-latest
    # Release only on a successful CI run for main, or a manual dispatch.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'main')
    permissions:
      contents: write   # push the bump commit + tag to main
      actions: read     # look up the CI run (dispatch path)
    outputs:
      should-release: ${{ steps.bump.outputs.should-release }}
      version: ${{ steps.bump.outputs.version }}
      tag: ${{ steps.bump.outputs.tag }}
      checkout-ref: ${{ steps.bump.outputs.checkout-ref }}
      image-tag: ${{ steps.bump.outputs.image-tag }}
      ci-run-id: ${{ steps.ci.outputs.run-id }}
    steps:
      - uses: actions/checkout@v7
        with:
          # The CI run's commit (workflow_run) or current main (dispatch).
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
          fetch-depth: 0
          fetch-tags: true
          persist-credentials: true   # needed to push the bump commit + tag

      - uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Install commitizen
        run: pip install commitizen

      - name: Compute version, stamp files, commit + tag
        id: bump
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail

          # Image tag = the CODE commit's CI-built image (computed BEFORE the
          # bump commit is created, so we retag exactly what CI tested).
          SHA=$(git rev-parse HEAD)
          echo "image-tag=sha-${SHA:0:7}" >> "$GITHUB_OUTPUT"

          # Next version: explicit dispatch input wins; otherwise commitizen
          # computes it from conventional commits since the last tag (scm).
          if [[ -n "${INPUT_VERSION}" ]]; then
            VERSION="${INPUT_VERSION#v}"
          else
            if RAW=$(cz bump --get-next 2>/tmp/cz.err); then
              VERSION=$(printf '%s\n' "$RAW" | grep -oE '[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z]+)*' | tail -n1 || true)
            else
              echo "::notice::No bumpable commits since the last tag — nothing to release."
              cat /tmp/cz.err || true
              echo "should-release=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi
          if [[ -z "${VERSION}" ]]; then
            echo "::notice::commitizen produced no version — nothing to release."
            echo "should-release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          TAG="v${VERSION}"
          echo "Releasing ${TAG}"

          # Stamp the version into the chart.
          sed -i "s/^version:.*/version: ${VERSION}/" charts/vault-access-operator/Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: \"${VERSION}\"/" charts/vault-access-operator/Chart.yaml
          sed -i "s/^\(\s*\)tag:.*/\1tag: \"${VERSION}\"/" charts/vault-access-operator/values.yaml

          # Promote CHANGELOG [Unreleased] -> [VERSION] (preserves hand-written prose).
          ./hack/promote-changelog.sh "${VERSION}"

          # Commit the bump + tag, then push to main in one shot. The push is made
          # with GITHUB_TOKEN, which does NOT re-trigger CI — so there's no release
          # loop. [skip ci] is belt-and-suspenders.
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add charts/vault-access-operator/Chart.yaml \
                  charts/vault-access-operator/values.yaml \
                  CHANGELOG.md
          git commit -m "bump: version ${VERSION}" -m "[skip ci]"
          git tag "${TAG}"
          # Push branch + tag atomically. NOT --follow-tags: that only pushes
          # annotated tags, silently dropping our lightweight tag and leaving
          # downstream `checkout ref: <tag>` jobs to fail on a missing remote tag.
          git push origin --atomic HEAD:main "refs/tags/${TAG}"

          {
            echo "version=${VERSION}"
            echo "tag=${TAG}"
            echo "checkout-ref=${TAG}"   # publish jobs check out the tagged (stamped) commit
            echo "should-release=true"
          } >> "$GITHUB_OUTPUT"

      - name: Resolve CI run id (image retag + SBOMs)
        id: ci
        if: steps.bump.outputs.should-release == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [[ "${{ github.event_name }}" == "workflow_run" ]]; then
            echo "run-id=${{ github.event.workflow_run.id }}" >> "$GITHUB_OUTPUT"
          else
            SHA="${{ github.event.workflow_run.head_sha || github.sha }}"
            RUN_ID=$(gh api "repos/${{ github.repository }}/actions/workflows/ci.yaml/runs?head_sha=${SHA}&status=success&per_page=1" \
              --jq '.workflow_runs[0].id // empty' 2>/dev/null || echo "")
            echo "run-id=${RUN_ID}" >> "$GITHUB_OUTPUT"
          fi

  # ============================================================================
  # Setup: Platform Matrix
  # ============================================================================

  setup:
    name: Setup
    runs-on: ubuntu-latest
    needs: [guard]
    if: needs.guard.outputs.should-release == 'true'
    outputs:
      platforms: ${{ steps.platforms.outputs.matrix }}
    steps:
      - name: Set platform matrix
        id: platforms
        run: |
          echo 'matrix=[{"platform":"linux/amd64","runner":"ubuntu-24.04"},{"platform":"linux/arm64","runner":"ubuntu-24.04-arm"}]' >> $GITHUB_OUTPUT

  # ============================================================================
  # Docker Release Build: Parallel per-platform builds (fallback)
  # ============================================================================
  # Only runs when there's no CI run to retag from.

  docker-release-build:
    name: Docker Build (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    needs: [guard, setup]
    if: needs.guard.outputs.should-release == 'true' && needs.guard.outputs.ci-run-id == ''
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.setup.outputs.platforms) }}
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ needs.guard.outputs.checkout-ref }}
          persist-credentials: false

      - name: Prepare platform vars
        id: platform
        run: |
          platform="${{ matrix.platform }}"
          echo "pair=${platform//\//-}" >> $GITHUB_OUTPUT  # linux/amd64 -> linux-amd64

      - name: Check if QEMU is needed
        id: qemu-check
        run: |
          RUNNER_ARCH="${{ runner.arch }}"
          TARGET="${{ matrix.platform }}"
          NEED_QEMU="true"
          if [[ "$RUNNER_ARCH" == "X64" && "$TARGET" == "linux/amd64" ]] || \
             [[ "$RUNNER_ARCH" == "ARM64" && "$TARGET" == "linux/arm64" ]]; then
            NEED_QEMU="false"
          fi
          echo "needed=$NEED_QEMU" >> $GITHUB_OUTPUT
          echo "Runner: $RUNNER_ARCH, Target: $TARGET, QEMU needed: $NEED_QEMU"

      - uses: docker/setup-qemu-action@v4
        if: steps.qemu-check.outputs.needed == 'true'

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: ${{ matrix.platform }}
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.guard.outputs.version }}-${{ steps.platform.outputs.pair }}
          cache-from: type=gha,scope=release-${{ steps.platform.outputs.pair }}
          cache-to: type=gha,scope=release-${{ steps.platform.outputs.pair }},mode=max

  # ============================================================================
  # Docker Release Manifest: Retag CI images or merge platform-specific builds
  # ============================================================================

  docker-release-manifest:
    name: Docker Manifest
    runs-on: ubuntu-latest
    needs: [guard, setup, docker-release-build]
    if: always() && needs.guard.outputs.should-release == 'true' && !contains(needs.*.result, 'failure')
    permissions:
      contents: read
      packages: write
    steps:
      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Retag existing CI-tested images (when CI run found)
      - name: Retag CI images to release version
        if: needs.guard.outputs.ci-run-id != ''
        env:
          IMAGE_TAG: ${{ needs.guard.outputs.image-tag }}
          VERSION: ${{ needs.guard.outputs.version }}
        run: |
          echo "Retagging ${IMAGE_TAG} -> ${VERSION} and latest"
          docker buildx imagetools create \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${VERSION} \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${IMAGE_TAG}

      # Fallback: merge platform-specific builds into multi-arch manifest
      - name: Create multi-platform manifest
        if: needs.guard.outputs.ci-run-id == ''
        env:
          VERSION: ${{ needs.guard.outputs.version }}
        run: |
          IMAGES=""
          for platform in $(echo '${{ needs.setup.outputs.platforms }}' | jq -r '.[].platform'); do
            pair="${platform//\//-}"
            IMAGES="$IMAGES ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${VERSION}-${pair}"
          done
          echo "Merging platform images into ${VERSION} and latest: $IMAGES"
          docker buildx imagetools create \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${VERSION} \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest \
            $IMAGES

  # ============================================================================
  # Create GitHub Release
  # ============================================================================

  github-release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [guard, docker-release-manifest]
    if: always() && needs.guard.outputs.should-release == 'true' && !contains(needs.*.result, 'failure')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ needs.guard.outputs.checkout-ref }}   # the tagged, version-stamped commit
          fetch-depth: 0
          persist-credentials: false

      # Download SBOMs from CI run (when available)
      - name: Download SBOM (linux-amd64)
        if: needs.guard.outputs.ci-run-id != ''
        uses: actions/download-artifact@v8
        with:
          run-id: ${{ needs.guard.outputs.ci-run-id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          name: sbom-linux-amd64
          path: /tmp/sbom-amd64/
        continue-on-error: true

      - name: Download SBOM (linux-arm64)
        if: needs.guard.outputs.ci-run-id != ''
        uses: actions/download-artifact@v8
        with:
          run-id: ${{ needs.guard.outputs.ci-run-id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          name: sbom-linux-arm64
          path: /tmp/sbom-arm64/
        continue-on-error: true

      # Generate install manifest with correct version. The chart is already
      # version-stamped by the bump commit (we check out the tag), so no sed here.
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - uses: azure/setup-helm@v5
        with:
          version: 'v3.14.0'

      - name: Build install manifest
        env:
          VERSION: ${{ needs.guard.outputs.version }}
        run: make build-installer IMG=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${VERSION}

      # Build additional release assets
      - name: Package CRDs tarball
        env:
          VERSION: ${{ needs.guard.outputs.version }}
        run: |
          tar -czvf crds-${VERSION}.tar.gz -C config/crd/bases/ .

      - name: Package Helm chart
        env:
          VERSION: ${{ needs.guard.outputs.version }}
        run: |
          helm package charts/vault-access-operator -d dist/

      - name: Generate checksums
        env:
          VERSION: ${{ needs.guard.outputs.version }}
        run: |
          cd dist
          cp ../crds-${VERSION}.tar.gz .
          sha256sum install.yaml crds-${VERSION}.tar.gz vault-access-operator-${VERSION}.tgz > checksums.txt
          cat checksums.txt

      # Prepare all release assets
      - name: Prepare release assets
        env:
          VERSION: ${{ needs.guard.outputs.version }}
        run: |
          mkdir -p release-assets
          cp dist/install.yaml release-assets/
          cp dist/crds-${VERSION}.tar.gz release-assets/
          cp dist/vault-access-operator-${VERSION}.tgz release-assets/
          cp dist/checksums.txt release-assets/
          [ -f /tmp/sbom-amd64/sbom.json ] && cp /tmp/sbom-amd64/sbom.json release-assets/sbom-linux-amd64.json || true
          [ -f /tmp/sbom-arm64/sbom.json ] && cp /tmp/sbom-arm64/sbom.json release-assets/sbom-linux-arm64.json || true
          echo "Release assets:"
          ls -la release-assets/

      - name: Generate changelog
        env:
          TAG: ${{ needs.guard.outputs.tag }}
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 "${TAG}^" 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            echo "Generating changelog from $PREV_TAG to $TAG"
            CHANGELOG=$(git log --pretty=format:"- %s" "$PREV_TAG".."$TAG" | grep -v '^- bump: ' | head -50)
          else
            echo "No previous tag found, using all commits"
            CHANGELOG=$(git log --pretty=format:"- %s" | grep -v '^- bump: ' | head -50)
          fi
          echo "$CHANGELOG" > /tmp/changelog.txt

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.guard.outputs.tag }}
          name: ${{ needs.guard.outputs.tag }}
          body_path: /tmp/changelog.txt
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(needs.guard.outputs.tag, '-') }}
          files: release-assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ============================================================================
  # Publish Helm Chart
  # ============================================================================

  helm-release:
    name: Helm Chart Release (OCI)
    runs-on: ubuntu-latest
    needs: [guard, github-release]
    if: always() && needs.guard.outputs.should-release == 'true' && !contains(needs.*.result, 'failure')
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ needs.guard.outputs.checkout-ref }}   # the tagged, version-stamped commit
          persist-credentials: false

      - uses: azure/setup-helm@v5
        with:
          version: 'v3.14.0'

      - name: Login to GHCR
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_ACTOR: ${{ github.actor }}
        run: echo "${GITHUB_TOKEN}" | helm registry login ghcr.io --username "${GH_ACTOR}" --password-stdin

      - name: Package and push Helm chart
        env:
          VERSION: ${{ needs.guard.outputs.version }}
          REPO: ${{ github.repository }}
        run: |
          helm package charts/vault-access-operator
          helm push "vault-access-operator-${VERSION}.tgz" "oci://ghcr.io/${REPO}/charts"

  # ============================================================================
  # Deploy Documentation
  # ============================================================================

  docs-release:
    name: Deploy Documentation
    runs-on: ubuntu-latest
    needs: [guard, github-release]
    if: always() && needs.guard.outputs.should-release == 'true' && !contains(needs.*.result, 'failure')
    permissions:
      contents: write
      pages: write
      id-token: write
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ needs.guard.outputs.checkout-ref }}
      - uses: actions/setup-python@v6
        with:
          python-version: '3.x'
      - run: pip install mkdocs-material
      - run: mkdocs build

      - name: Deploy to gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.guard.outputs.tag }}
        run: |
          git clone --branch gh-pages --single-branch \
            "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git" gh-pages 2>/dev/null || {
            mkdir gh-pages && cd gh-pages && git init -b gh-pages
            git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git"
          }
          rsync -av --delete --exclude='.git' site/ gh-pages/
          touch gh-pages/.nojekyll
          cd gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A && git commit -m "Deploy docs for $TAG" || true
          git push origin gh-pages --force

  # ============================================================================
  # Summary
  # ============================================================================

  release-summary:
    name: Release Summary
    runs-on: ubuntu-latest
    needs: [guard, docker-release-manifest, github-release, helm-release, docs-release]
    if: always() && needs.guard.outputs.should-release == 'true'
    env:
      VERSION: ${{ needs.guard.outputs.version }}
      TAG: ${{ needs.guard.outputs.tag }}
    steps:
      - name: Summary
        run: |
          echo "## Release $TAG Complete!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Artifacts" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Artifact | Location |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|----------|" >> $GITHUB_STEP_SUMMARY
          echo "| Docker Image | ghcr.io/${{ github.repository }}:$VERSION |" >> $GITHUB_STEP_SUMMARY
          echo "| Helm Chart | \`helm install vault-access-operator oci://ghcr.io/${{ github.repository }}/charts/vault-access-operator --version $VERSION\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Documentation | https://panteparak.github.io/vault-access-operator/ |" >> $GITHUB_STEP_SUMMARY
          echo "| GitHub Release | https://github.com/${{ github.repository }}/releases/tag/$TAG |" >> $GITHUB_STEP_SUMMARY
