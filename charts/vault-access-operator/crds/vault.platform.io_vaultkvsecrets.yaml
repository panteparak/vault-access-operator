---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.18.0
  name: vaultkvsecrets.vault.platform.io
spec:
  group: vault.platform.io
  names:
    kind: VaultKVSecret
    listKind: VaultKVSecretList
    plural: vaultkvsecrets
    shortNames:
    - vks
    singular: vaultkvsecret
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.vaultPath
      name: Path
      type: string
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .status.seeded
      name: Seeded
      type: boolean
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: VaultKVSecret is the Schema for the vaultkvsecrets API.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              VaultKVSecretSpec defines the desired state of VaultKVSecret.

              A VaultKVSecret pre-creates ("seeds") a KV v2 secret path so consumers such
              as External Secrets Operator (ESO) don't fail when the source path is missing
              on a fresh deployment. The operator only ever CREATES the path when absent —
              it never overwrites or reads the values stored there, so real data written
              later by ESO or a human is never clobbered.
            properties:
              connectionRef:
                description: ConnectionRef is the name of the VaultConnection to use.
                type: string
              data:
                additionalProperties:
                  type: string
                description: |-
                  Data is the initial key/value content written when the path is absent.
                  Values are typically empty-string placeholders so ESO references that
                  target a specific property (remoteRef.property) resolve. Defaults to an
                  empty map ({}), which is sufficient for whole-secret (dataFrom) reads.

                  The operator only writes Data when the path does not already exist; it
                  NEVER overwrites an existing secret, so a non-empty real secret written
                  later is preserved.
                type: object
              deletionPolicy:
                default: Delete
                description: |-
                  DeletionPolicy defines what happens to the seeded secret when this
                  resource is deleted. "Delete" (default) removes the seeded secret only if
                  it is still operator-owned and unmodified since seeding (delete-if-untouched);
                  a secret that has been written to since seeding is always retained.
                  "Retain" never deletes the seeded secret.
                enum:
                - Delete
                - Retain
                type: string
              path:
                description: |-
                  Path is the full KV v2 data path to seed, e.g.
                  "secret/data/apps/myapp/config". It MUST contain a "/data/" segment
                  (the KV v2 data API) and is immutable after creation — changing it would
                  orphan the previously-seeded secret.
                minLength: 1
                type: string
                x-kubernetes-validations:
                - message: path is immutable
                  rule: self == oldSelf
                - message: path must be a KV v2 data path containing a '/data/' segment,
                    e.g. secret/data/apps/myapp
                  rule: self.matches('^[^/]+/data/.+')
            required:
            - connectionRef
            - path
            type: object
          status:
            description: VaultKVSecretStatus defines the observed state of VaultKVSecret.
            properties:
              binding:
                description: |-
                  Binding contains the explicit reference to the Vault resource.
                  Acts like a foreign key to the Vault resource.
                properties:
                  authMount:
                    description: |-
                      AuthMount is the auth mount path (only for roles)
                      Example: "kubernetes" or "kubernetes-prod"
                    type: string
                  bindingVerified:
                    description: BindingVerified indicates the binding was verified
                      against Vault
                    type: boolean
                  boundAt:
                    description: BoundAt is when the binding was established
                    format: date-time
                    type: string
                  lastVerifiedAt:
                    description: LastVerifiedAt is when the binding was last verified
                    format: date-time
                    type: string
                  vaultPath:
                    description: |-
                      VaultPath is the full API path to the Vault resource
                      Example: "sys/policies/acl/prod-my-policy" or "auth/kubernetes/role/prod-my-role"
                    type: string
                  vaultResourceName:
                    description: |-
                      VaultResourceName is the name of the resource in Vault
                      Example: "prod-my-policy" or "prod-my-role"
                    type: string
                type: object
              conditions:
                description: Conditions represent the latest available observations
                items:
                  description: Condition represents a condition of a resource
                  properties:
                    lastTransitionTime:
                      description: LastTransitionTime is the last time the condition
                        transitioned
                      format: date-time
                      type: string
                    message:
                      description: Message is a human-readable explanation
                      type: string
                    observedGeneration:
                      description: ObservedGeneration represents the generation observed
                        by the controller
                      format: int64
                      type: integer
                    reason:
                      description: Reason for the condition's last transition
                      type: string
                    status:
                      description: Status of the condition (True, False, Unknown)
                      type: string
                    type:
                      description: Type of condition
                      type: string
                  required:
                  - lastTransitionTime
                  - reason
                  - status
                  - type
                  type: object
                type: array
              deletionStartedAt:
                description: |-
                  DeletionStartedAt is the time when deletion was first attempted.
                  Used for tracking stuck finalizers and deletion timeouts.
                format: date-time
                type: string
              driftCorrectedAt:
                description: DriftCorrectedAt is the time when drift was last corrected
                format: date-time
                type: string
              driftDetected:
                description: DriftDetected indicates whether the Vault resource differs
                  from the desired state
                type: boolean
              driftSummary:
                description: |-
                  DriftSummary provides a human-readable description of detected drift
                  Example: "policy content differs" or "fields differ: policies, bound_service_account_names"
                type: string
              effectiveDriftMode:
                description: EffectiveDriftMode is the resolved drift mode after considering
                  resource and connection defaults
                enum:
                - ignore
                - detect
                - correct
                type: string
              lastAppliedHash:
                description: |-
                  LastAppliedHash is the hash of the last applied spec.
                  Used to distinguish between spec changes and external Vault drift.
                type: string
              lastAttemptAt:
                description: LastAttemptAt is the time of the last sync attempt
                format: date-time
                type: string
              lastDriftCheckAt:
                description: LastDriftCheckAt is the time of the last drift detection
                  check
                format: date-time
                type: string
              lastReconcileID:
                description: |-
                  LastReconcileID is the correlation ID of the most recent reconciliation cycle.
                  Use this to filter operator logs: kubectl logs ... | jq 'select(.reconcileID == "<id>")'
                type: string
              lastSyncedAt:
                description: LastSyncedAt is the time of the last successful sync
                format: date-time
                type: string
              managed:
                description: Managed indicates whether this resource is managed by
                  the operator
                type: boolean
              message:
                description: Message provides additional information about the current
                  state
                type: string
              nextRetryAt:
                description: NextRetryAt is the time of the next retry attempt
                format: date-time
                type: string
              phase:
                description: Phase represents the current phase of the resource
                enum:
                - Pending
                - Syncing
                - Active
                - Conflict
                - Error
                - Deleting
                type: string
              retryCount:
                description: RetryCount is the number of retry attempts
                type: integer
              seeded:
                description: |-
                  Seeded indicates the operator created this path (true) versus the path
                  already existing when first reconciled (false). Only an operator-seeded
                  path is eligible for delete-if-untouched cleanup.
                type: boolean
              seededVersion:
                description: |-
                  SeededVersion is the KV v2 version the operator created. It is the
                  baseline for the delete-if-untouched check: on deletion, if the current
                  version differs, the secret has been written to since seeding and is
                  retained. Zero when the path pre-existed (not seeded by the operator).
                type: integer
              vaultPath:
                description: VaultPath is the resolved KV v2 data path that was seeded.
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
