# MkDocs configuration for Vault Access Operator documentation
# Preview: mkdocs serve
# Build: mkdocs build

site_name: Vault Access Operator
site_description: A Kubernetes operator for managing HashiCorp Vault access policies and roles
site_url: https://panteparak.github.io/vault-access-operator/
repo_url: https://github.com/panteparak/vault-access-operator
repo_name: panteparak/vault-access-operator
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.top
    - search.highlight
    - content.code.copy
    - content.action.edit
  icon:
    repo: fontawesome/brands/github

# Exclude the contributor-facing `internal/` subtree — it's built separately
# via `mkdocs-internal.yml` into `site/internal/`.
exclude_docs: |
  internal/

validation:
  nav:
    omitted_files: ignore
  links:
    absolute_links: warn
    # ADRs and concept docs link to source code via `../../<repo path>` so the
    # GitHub-rendered view jumps to source. These links don't resolve inside the
    # built site — downgrade to info so --strict still passes.
    unrecognized_links: info
    anchors: info
    not_found: info

plugins:
  - search

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - tables
  - toc:
      permalink: true

# Hierarchical navigation
nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Concepts:
    - Overview: concepts/index.md
    - Architecture: concepts/architecture.md
    - Drift Detection: concepts/drift-detection.md
    - Discovery: concepts/discovery.md
  - Authentication Methods:
    - Overview: auth-methods/index.md
    - Kubernetes: auth-methods/kubernetes.md
    - JWT: auth-methods/jwt.md
    - 'JWT for GitLab CI': auth-methods/jwt-gitlab.md
    - OIDC: auth-methods/oidc.md
    - AWS IAM: auth-methods/aws-iam.md
    - GCP IAM: auth-methods/gcp-iam.md
    - AppRole: auth-methods/approle.md
    - Token: auth-methods/token.md
    - Bootstrap: auth-methods/bootstrap.md
  - Configuration: configuration.md
  - API Reference: api-reference.md
  - Examples: examples.md
  - Webhooks: webhooks.md
  - Troubleshooting: troubleshooting.md
  - Decisions:
    - Overview: adr/README.md
    - 'ADR 0001 — Adapter pattern': adr/0001-adapter-pattern-for-cluster-scoped-types.md
    - 'ADR 0002 — Template Method base reconciler': adr/0002-template-method-base-reconciler.md
    - 'ADR 0003 — Two-level drift & conflict config': adr/0003-two-level-drift-and-conflict-config.md
    - 'ADR 0004 — Event bus closure capture': adr/0004-event-bus-closure-capture.md
    - 'ADR 0005 — Cleanup ConfigMap queue': adr/0005-cleanup-failure-configmap-queue.md
    - 'Template': adr/0000-template.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/panteparak/vault-access-operator

copyright: Copyright &copy; 2024-2026 Vault Access Operator Contributors
